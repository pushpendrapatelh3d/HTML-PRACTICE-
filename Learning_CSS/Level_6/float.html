<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLOAT PROPERTY</title>
    <style>
        *{
            margin:0px;
            padding:0px;
        }
        #container{
            height:110px;
            width:300px;
            border:1px solid black;
        }
        .box{
            width:100px;
            height:100px;
            margin:5px;
        }
        #box1{
            background-color:red;
            float:right;
        }
        #box2{
            background-color:blue;
            float:left;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="box1" class="box"></div>
        <div id="box2" class="box"></div>
    </div>
</body>
</html>
