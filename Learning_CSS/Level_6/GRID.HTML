<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0px;
            padding:0px;
        }
        #container{
            background-color: cadetblue;
            padding:5px;
            border:1px solid black;
            height:160px;
            width:160px;
            display:grid;
            grid-template-columns: 80px 80px;
            grid-template-rows: 80px 80px;

        }
        .box{
            
            height:80px;
            width:80px;
            align-content: center;
        }
        #box1{
            grid-column: 1/2;
            grid-row: 1/2;
            background-color: chartreuse;
        }
        #box2{
            grid-column: 2/2;
            grid-row: 1/2;
            background-color: blueviolet;
        }
        #box3{
            grid-column: 1/2;
            grid-row: 2/2;
            background-color:aqua;
        }
        #box4{
            grid-column: 2/2;
            grid-row: 2/2;
            background-color: brown;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="box" id="box1">ITEM 1</div>
        <div class="box" id="box2">ITEM 2</div>
        <div class="box" id="box3">ITEM 3</div>
        <div class="box" id="box4">ITEM 4</div>
    </div>
</body>
</html>
