<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        .box{
            height:70px;
            width:70px;
            border:2px solid black ;
            border-radius:5px;
            background-color:plum;
            position:relative;
            top:10px;
            left:10px;
            animation: move;
            animation-duration: 2s;
            animation-timing-function: ease-in-out;
            animation-delay:0.3s;
            animation-direction:alternate;
            
            animation-iteration-count: infinite;
        }

        @keyframes move{
            form{
                left:10px;
                top:10px;
            }
            to{
                left:200px;
                top:10px;
            }
        }
            @keyframes move2{
            0%{
                left:10px;
                top:10px;
            }
            100%{
                left:200px;
                top:10px;
            }
        }
    </style>
</head>
<body>
    <div class="box">
        Animate</div>
</body>
</html>
