<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .psuedo{
            height:50px;
            width:120px;
            padding:10px;
            background-color: rgb(242, 167, 113);
            border-radius:50px;
        }
        .psuedo:hover{
            background-color: rgb(231, 135, 67);
            cursor:pointer;
        }
        .psuedo:active{
            background-color:rgb(216, 112, 38);
        }
    </style>
</head>
<body>
    <button class="psuedo">
        Click me
    </button>
</body>
</html>
