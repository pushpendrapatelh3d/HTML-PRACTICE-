<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height:50px;
            width:50px;
            border:2px solid black ;
            border-radius:5px;
            background-color:plum;
            position:relative;
            top:50px;
            left:50px;
            transition: all 0.5s ease-in;
        }
        .box:hover{
            transform:rotatez(45deg)
        }
        .box:active{
            transform:rotatez(90deg);
        }
    </style>
</head>
<body>
    <div class="box">
        default
    </div>
    
</body>
</html>
